app = "bibliotheque-cedeao"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  STORAGE_PATH = "/data"
  DATABASE_URL = "file:/data/dev.db"
  # Rappel: configurez EMERGENCY_ADMIN_EMAIL et EMERGENCY_ADMIN_PASSWORD avec 'fly secrets set'

[mounts]
  source = "cedeao_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
