
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEDEAO Vision 2050 - Bibliothèque de Documents</title>
  <link rel="icon" type="image/png" href="/CEDEAO.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --cedeao-green: #00843D;
      --cedeao-yellow: #FEB813;
      --cedeao-brown: #A1482F;
      --cedeao-bg-overlay: rgba(250, 250, 235, 0.85);
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      /* L'image couvre tout le fond et reste fixe au scroll */
      background-image: url('background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    /* Overlay pour garantir la lisibilité du contenu au-dessus de l'image */
    #root {
      min-height: 100vh;
      background-color: var(--cedeao-bg-overlay);
      backdrop-filter: blur(2px);
    }

    .cedeao-gradient {
      background: linear-gradient(90deg, var(--cedeao-yellow) 0%, var(--cedeao-brown) 33%, var(--cedeao-green) 33%, var(--cedeao-green) 100%);
    }
    
    .text-cedeao-green { color: var(--cedeao-green); }
    .bg-cedeao-green { background-color: var(--cedeao-green); }
    .hover-bg-cedeao-green:hover { background-color: #006b31; }
    .border-cedeao-green { border-color: var(--cedeao-green); }

    /* Scrollbar personnalisée aux couleurs CEDEAO */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--cedeao-green);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--cedeao-brown);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
